<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Písmenka a slova 🔤 – Tobík a Timča</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1d3557;
    --accent: #ff8c42;
    --accent2: #3d7dd8;
    --good: #2e9e63;
    --bad: #e05555;
    --card: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, #ffe3a3 0%, #fff0cd 45%, #fffaef 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 16px 40px;
  }

  header {
    width: 100%; max-width: 760px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header a, header button.nav {
    text-decoration: none; color: var(--ink); font-weight: 900;
    background: #fff; padding: 8px 14px; border-radius: 999px; border: none;
    box-shadow: 0 2px 8px rgba(29,53,87,.2); font-size: .9rem;
    cursor: pointer; font-family: inherit;
  }
  header h1 { font-size: 1.5rem; font-weight: 900; }
  .spacer { flex: 1; }
  .stats { display: flex; gap: 12px; font-weight: 900; font-size: 1rem; }
  .stats span b { color: #fff; background: var(--accent); border-radius: 999px; padding: 2px 10px; }

  #home {
    margin-top: 26px; width: 100%; max-width: 760px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px;
  }
  .mode-card {
    background: var(--card); border: 3px solid transparent; border-radius: 20px;
    padding: 20px 14px; text-align: center; cursor: pointer;
    box-shadow: 0 6px 18px rgba(29,53,87,.18);
    transition: transform .15s;
    font-family: inherit; color: var(--ink);
  }
  .mode-card:hover { transform: translateY(-4px); border-color: var(--accent2); }
  .mode-card .emoji { font-size: 2.5rem; display: block; }
  .mode-card h3 { font-size: 1.05rem; font-weight: 900; margin-top: 6px; }
  .mode-card p { font-size: .78rem; font-weight: 700; color: #4a6280; margin-top: 4px; }
  .mode-card .who { display: inline-block; margin-top: 8px; font-size: .7rem; font-weight: 900; padding: 3px 10px; border-radius: 999px; }
  .who.timca { background: #ffe3ef; color: #c2417e; }
  .who.tobik { background: #dcebff; color: #2f66b3; }

  #game { display: none; width: 100%; max-width: 760px; margin-top: 20px; }
  #qcard {
    background: var(--card); border-radius: 24px;
    box-shadow: 0 10px 28px rgba(29,53,87,.22);
    padding: 26px 22px; text-align: center;
    position: relative; overflow: hidden;
  }
  #qtitle { font-weight: 900; font-size: 1rem; color: #4a6280; }
  #big-emoji { font-size: 5rem; margin-top: 10px; }
  #word-display {
    font-size: clamp(1.8rem, 7vw, 2.8rem); font-weight: 900; letter-spacing: 6px; margin-top: 10px;
    min-height: 1.4em;
  }
  #word-display .gap { color: var(--accent2); border-bottom: 4px dotted var(--accent2); padding: 0 4px; }

  /* sloty pro skládání slova */
  #slots { display: none; justify-content: center; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .slot {
    width: 54px; height: 62px; border-radius: 12px;
    border: 3px dashed #c3d6ea; background: #f4f9fe;
    font-size: 2rem; font-weight: 900;
    display: flex; align-items: center; justify-content: center;
  }
  .slot .hintletter { color: #c9d8e8; }
  .slot.filled { border-style: solid; border-color: var(--good); color: var(--ink); background: #eafaf0; }

  #choices { display: none; justify-content: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
  #choices button {
    font-family: inherit; font-weight: 900; font-size: 1.9rem;
    background: #f4f9fe; color: var(--ink); border: 3px solid #c3d6ea;
    border-radius: 18px; padding: 12px 24px; cursor: pointer; min-width: 84px;
    transition: transform .12s;
  }
  #choices button:hover { transform: scale(1.07); border-color: var(--accent2); }
  #choices button.emoji-opt { font-size: 2.6rem; }
  #choices button.used { opacity: .35; pointer-events: none; }

  #feedback { min-height: 40px; margin-top: 16px; font-weight: 900; font-size: 1.15rem; }
  #feedback.good { color: var(--good); }
  #feedback.bad { color: var(--bad); }
  #next {
    display: none; font-family: inherit; font-weight: 900; font-size: 1.05rem;
    background: var(--accent); color: #fff; border: none; border-radius: 14px;
    padding: 12px 26px; margin-top: 10px; cursor: pointer;
  }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .shake { animation: shake .3s; }
  @keyframes pop { 0%{transform:scale(.4);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  .pop { animation: pop .35s; }
  .confetti {
    position: fixed; font-size: 1.7rem; pointer-events: none; z-index: 50;
    animation: fly 1.1s ease-out forwards;
  }
  @keyframes fly {
    0% { transform: translateY(0) scale(.6) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-140px) scale(1.4) rotate(40deg); opacity: 0; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" title="Zpět na rozcestník">🏠</a>
  <button class="nav" id="btn-back" style="display:none">← Jiná hra</button>
  <h1>🔤 Písmenka a slova</h1>
  <div class="spacer"></div>
  <div class="stats">
    <span>⭐ <b id="stat-stars">0</b></span>
    <span>🔥 <b id="stat-streak">0</b></span>
  </div>
</header>

<div id="home"></div>

<div id="game">
  <div id="qcard">
    <div id="qtitle"></div>
    <div id="big-emoji"></div>
    <div id="word-display"></div>
    <div id="slots"></div>
    <div id="choices"></div>
    <div id="feedback"></div>
    <button id="next">Další ➜</button>
  </div>
</div>

<script>
(function () {
  const $ = id => document.getElementById(id);
  const rnd = n => Math.floor(Math.random() * n);
  const pick = a => a[rnd(a.length)];
  const shuffle = a => { for (let i = a.length - 1; i > 0; i--) { const j = rnd(i + 1); [a[i], a[j]] = [a[j], a[i]]; } return a; };

  // ---------- slovníček: slovo, emoji, slabiky ----------
  const WORDS = [
    ["PES", "🐶", ["PES"]],
    ["KOČKA", "🐱", ["KOČ", "KA"]],
    ["RYBA", "🐟", ["RY", "BA"]],
    ["AUTO", "🚗", ["AU", "TO"]],
    ["DŮM", "🏠", ["DŮM"]],
    ["STROM", "🌳", ["STROM"]],
    ["SLON", "🐘", ["SLON"]],
    ["MYŠ", "🐭", ["MYŠ"]],
    ["LEV", "🦁", ["LEV"]],
    ["KYTKA", "🌸", ["KYT", "KA"]],
    ["SLUNCE", "☀️", ["SLUN", "CE"]],
    ["MĚSÍC", "🌙", ["MĚ", "SÍC"]],
    ["HVĚZDA", "⭐", ["HVĚZ", "DA"]],
    ["BANÁN", "🍌", ["BA", "NÁN"]],
    ["MRKEV", "🥕", ["MR", "KEV"]],
    ["SÝR", "🧀", ["SÝR"]],
    ["VEJCE", "🥚", ["VEJ", "CE"]],
    ["MED", "🍯", ["MED"]],
    ["KNIHA", "📖", ["KNI", "HA"]],
    ["BALÓN", "🎈", ["BA", "LÓN"]],
    ["MÍČ", "⚽", ["MÍČ"]],
    ["VLAK", "🚂", ["VLAK"]],
    ["LOĎ", "⛵", ["LOĎ"]],
    ["ŽÁBA", "🐸", ["ŽÁ", "BA"]],
    ["KŮŇ", "🐴", ["KŮŇ"]],
    ["KRÁVA", "🐮", ["KRÁ", "VA"]],
    ["PRASE", "🐷", ["PRA", "SE"]],
    ["OVCE", "🐑", ["OV", "CE"]],
    ["KUŘE", "🐤", ["KU", "ŘE"]],
    ["SOVA", "🦉", ["SO", "VA"]],
    ["VČELA", "🐝", ["VČE", "LA"]],
    ["MOTÝL", "🦋", ["MO", "TÝL"]],
    ["DORT", "🎂", ["DORT"]],
    ["HRUŠKA", "🍐", ["HRUŠ", "KA"]],
    ["JAHODA", "🍓", ["JA", "HO", "DA"]],
    ["CITRON", "🍋", ["CI", "TRON"]],
    ["JABLKO", "🍎", ["JA", "BL", "KO"]],
    ["RUKA", "✋", ["RU", "KA"]],
    ["NOHA", "🦵", ["NO", "HA"]],
    ["ZUB", "🦷", ["ZUB"]],
    ["SRDCE", "❤️", ["SRD", "CE"]],
    ["KLÍČ", "🔑", ["KLÍČ"]],
    ["DÁREK", "🎁", ["DÁ", "REK"]],
    ["TUŽKA", "✏️", ["TUŽ", "KA"]],
    ["HODINY", "🕐", ["HO", "DI", "NY"]],
    ["ROBOT", "🤖", ["RO", "BOT"]],
    ["DUHA", "🌈", ["DU", "HA"]],
    ["MRAK", "☁️", ["MRAK"]],
    ["SNÍH", "❄️", ["SNÍH"]],
    ["OHEŇ", "🔥", ["O", "HEŇ"]],
    ["VODA", "💧", ["VO", "DA"]],
    ["ZMRZLINA", "🍦", ["ZMRZ", "LI", "NA"]],
    ["PIZZA", "🍕", ["PIZ", "ZA"]],
    ["TYGR", "🐯", ["TYGR"]],
    ["OPICE", "🐵", ["O", "PI", "CE"]],
    ["PAPOUŠEK", "🦜", ["PA", "POU", "ŠEK"]],
    ["ŽELVA", "🐢", ["ŽEL", "VA"]],
    ["DELFÍN", "🐬", ["DEL", "FÍN"]],
    ["RAKETA", "🚀", ["RA", "KE", "TA"]],
    ["KOLO", "🚲", ["KO", "LO"]]
  ];

  const MODES = {
    first: {
      emoji: "🅰️", name: "První písmeno", desc: "Na jaké písmeno začíná obrázek?",
      who: ["timca", "Pro Timču"]
    },
    syl: {
      emoji: "🧩", name: "Slabiky", desc: "Doplň chybějící slabiku ve slově",
      who: ["timca", "Pro Timču"]
    },
    build: {
      emoji: "🔗", name: "Skládání slov", desc: "Poskládej slovo z písmenek",
      who: ["timca", "Pro Timču"]
    },
    read: {
      emoji: "📖", name: "Přečti a najdi", desc: "Přečti slovo a najdi správný obrázek",
      who: ["tobik", "Pro čtenáře"]
    }
  };

  // ---------- stav ----------
  const store = JSON.parse(localStorage.getItem("tt-pismenka") || '{"stars":0}');
  let mode = null, q = null, tries = 0, locked = false, streak = 0;
  let buildPos = 0; // pozice ve skládaném slově

  function save() { localStorage.setItem("tt-pismenka", JSON.stringify(store)); }
  function renderStats() {
    $("stat-stars").textContent = store.stars;
    $("stat-streak").textContent = streak;
  }
  function confetti() {
    const emo = ["🎉", "⭐", "✨", "🎊", "🌟"];
    const r = $("qcard").getBoundingClientRect();
    for (let i = 0; i < 8; i++) {
      const s = document.createElement("span");
      s.className = "confetti";
      s.textContent = pick(emo);
      s.style.left = (r.left + r.width / 2 + (Math.random() - 0.5) * r.width * 0.7) + "px";
      s.style.top = (r.top + r.height / 2) + "px";
      s.style.animationDelay = (Math.random() * 0.25) + "s";
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 1600);
    }
  }

  // ---------- domovská obrazovka ----------
  const home = $("home");
  for (const [key, m] of Object.entries(MODES)) {
    const b = document.createElement("button");
    b.className = "mode-card";
    b.innerHTML = `<span class="emoji">${m.emoji}</span><h3>${m.name}</h3><p>${m.desc}</p>`;
    b.onclick = () => { mode = key; home.style.display = "none"; $("game").style.display = "block"; $("btn-back").style.display = "inline-block"; nextQuestion(); };
    home.appendChild(b);
  }
  $("btn-back").onclick = () => {
    $("game").style.display = "none";
    $("btn-back").style.display = "none";
    home.style.display = "grid";
  };

  // ---------- generátory ----------
  function genQuestion() {
    if (mode === "first") {
      const w = pick(WORDS);
      const letters = new Set([w[0][0]]);
      let guard = 0;
      while (letters.size < 3 && guard++ < 60) letters.add(pick(WORDS)[0][0]);
      return { type: "first", w, answer: w[0][0], options: shuffle([...letters]) };
    }
    if (mode === "syl") {
      const cand = WORDS.filter(x => x[2].length >= 2);
      const w = pick(cand);
      const gapIdx = rnd(w[2].length);
      const opts = new Set([w[2][gapIdx]]);
      let guard = 0;
      while (opts.size < 3 && guard++ < 80) {
        const o = pick(pick(cand)[2]);
        if (o !== w[2][gapIdx]) opts.add(o);
      }
      return { type: "syl", w, gapIdx, answer: w[2][gapIdx], options: shuffle([...opts]) };
    }
    if (mode === "build") {
      const cand = WORDS.filter(x => x[0].length >= 3 && x[0].length <= 6);
      const w = pick(cand);
      return { type: "build", w, letters: shuffle(w[0].split("").map((ch, i) => ({ ch, i }))) };
    }
    if (mode === "read") {
      const w = pick(WORDS);
      const opts = new Set([w]);
      let guard = 0;
      while (opts.size < 4 && guard++ < 60) {
        const o = pick(WORDS);
        if (o[0] !== w[0]) opts.add(o);
      }
      return { type: "read", w, answer: w[1], options: shuffle([...opts].map(x => x[1])) };
    }
  }

  function nextQuestion() {
    q = genQuestion();
    tries = 0; locked = false; buildPos = 0;
    $("feedback").textContent = ""; $("feedback").className = "";
    $("next").style.display = "none";
    $("slots").style.display = "none";
    const ch = $("choices");
    ch.style.display = "flex";
    ch.innerHTML = "";

    if (q.type === "first") {
      $("qtitle").textContent = "Na jaké písmeno začíná tohle slovo?";
      $("big-emoji").textContent = q.w[1];
      $("word-display").innerHTML = "";
      q.options.forEach(o => addChoice(o, () => answer(o)));
    }
    if (q.type === "syl") {
      $("qtitle").textContent = "Která slabika tam chybí?";
      $("big-emoji").textContent = q.w[1];
      $("word-display").innerHTML = q.w[2].map((s, i) => i === q.gapIdx ? '<span class="gap">__</span>' : s).join("·");
      q.options.forEach(o => addChoice(o, () => answer(o)));
    }
    if (q.type === "build") {
      $("qtitle").textContent = "Poskládej slovo — ťukej na písmenka popořadě!";
      $("big-emoji").textContent = q.w[1];
      $("word-display").innerHTML = "";
      const slots = $("slots");
      slots.style.display = "flex";
      slots.innerHTML = "";
      q.w[0].split("").forEach(chr => {
        const d = document.createElement("div");
        d.className = "slot";
        d.innerHTML = '<span class="hintletter">' + chr + "</span>";
        slots.appendChild(d);
      });
      q.letters.forEach(obj => {
        const b = addChoice(obj.ch, () => buildTap(b, obj));
      });
    }
    if (q.type === "read") {
      $("qtitle").textContent = "Přečti slovo a najdi obrázek!";
      $("big-emoji").textContent = "";
      $("word-display").textContent = q.w[0];
      q.options.forEach(o => {
        const b = addChoice(o, () => answer(o));
        b.classList.add("emoji-opt");
      });
    }
    $("qcard").classList.remove("pop");
    void $("qcard").offsetWidth;
    $("qcard").classList.add("pop");
  }

  function addChoice(label, fn) {
    const b = document.createElement("button");
    b.textContent = label;
    b.onclick = fn;
    $("choices").appendChild(b);
    return b;
  }

  // ---------- skládání slova ----------
  function buildTap(btn, obj) {
    if (locked) return;
    const target = q.w[0][buildPos];
    if (obj.ch === target) {
      btn.classList.add("used");
      const slot = $("slots").children[buildPos];
      slot.textContent = obj.ch;
      slot.classList.add("filled");
      buildPos++;
      if (buildPos >= q.w[0].length) success();
    } else {
      wrong();
    }
  }

  // ---------- vyhodnocení ----------
  function success() {
    locked = true;
    streak++;
    store.stars++;
    save();
    renderStats();
    $("feedback").textContent = pick(["Výborně! 🎉", "Super! ⭐", "Paráda! 👏", "Přesně tak! 🌟", "Jsi šikula! 💪"]);
    $("feedback").className = "good";
    if (q.type === "first") $("word-display").textContent = q.w[0];
    if (q.type === "syl") $("word-display").textContent = q.w[2].join("·") + "  →  " + q.w[0];
    if (q.type === "read") $("big-emoji").textContent = q.answer;
    confetti();
    setTimeout(nextQuestion, 1600);
  }

  function wrong() {
    tries++;
    streak = 0;
    renderStats();
    $("qcard").classList.remove("shake");
    void $("qcard").offsetWidth;
    $("qcard").classList.add("shake");
    if (tries >= 2 && q.type !== "build") {
      locked = true;
      const correct = q.type === "read" ? q.w[1] + " (" + q.w[0] + ")" : q.answer;
      $("feedback").textContent = "Správně je: " + correct;
      $("feedback").className = "bad";
      $("next").style.display = "inline-block";
    } else {
      $("feedback").textContent = "Zkus to ještě jednou! 🙂";
      $("feedback").className = "bad";
    }
  }

  function answer(val) {
    if (locked || !q) return;
    if (val === q.answer) success();
    else wrong();
  }

  $("next").onclick = nextQuestion;
  renderStats();
})();
</script>
</body>
</html>
