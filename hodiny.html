<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hodiny 🕐 – Tobík a Timča</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1d3557;
    --accent: #ff8c42;
    --accent2: #3d7dd8;
    --good: #2e9e63;
    --bad: #e05555;
    --card: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, #d5c7f5 0%, #e8dffb 45%, #f8f5ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 16px 40px;
  }

  header {
    width: 100%; max-width: 760px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header a, header button.nav {
    text-decoration: none; color: var(--ink); font-weight: 900;
    background: #fff; padding: 8px 14px; border-radius: 999px; border: none;
    box-shadow: 0 2px 8px rgba(29,53,87,.2); font-size: .9rem;
    cursor: pointer; font-family: inherit;
  }
  header h1 { font-size: 1.5rem; font-weight: 900; }
  .spacer { flex: 1; }
  .stats { display: flex; gap: 12px; font-weight: 900; font-size: 1rem; }
  .stats span b { color: #fff; background: var(--accent); border-radius: 999px; padding: 2px 10px; }

  #home {
    margin-top: 40px; width: 100%; max-width: 640px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px;
  }
  .mode-card {
    background: var(--card); border: 3px solid transparent; border-radius: 22px;
    padding: 26px 18px; text-align: center; cursor: pointer;
    box-shadow: 0 8px 22px rgba(29,53,87,.18);
    transition: transform .15s;
    font-family: inherit; color: var(--ink);
  }
  .mode-card:hover { transform: translateY(-5px); border-color: var(--accent2); }
  .mode-card .emoji { font-size: 3rem; display: block; }
  .mode-card h3 { font-size: 1.15rem; font-weight: 900; margin-top: 8px; }
  .mode-card p { font-size: .82rem; font-weight: 700; color: #4a6280; margin-top: 5px; }

  #game { display: none; width: 100%; max-width: 760px; margin-top: 16px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  .chip {
    font-family: inherit; font-weight: 800; font-size: .82rem;
    border: 2px solid #fff; background: rgba(255,255,255,.65); color: var(--ink);
    border-radius: 999px; padding: 6px 13px; cursor: pointer;
  }
  .chip.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

  #qcard {
    background: var(--card); border-radius: 24px;
    box-shadow: 0 10px 28px rgba(29,53,87,.22);
    padding: 22px; margin-top: 14px; text-align: center;
    position: relative; overflow: hidden;
  }
  #qtitle { font-weight: 900; font-size: 1.05rem; color: #4a6280; }
  #target-time {
    font-size: clamp(2.2rem, 8vw, 3rem); font-weight: 900; color: var(--accent2);
    margin-top: 6px; letter-spacing: 2px; display: none;
  }
  #clockwrap { margin: 14px auto 0; max-width: 300px; }
  #clock { width: 100%; height: auto; display: block; }

  /* ovládání ručiček */
  #hand-controls { display: none; justify-content: center; gap: 26px; margin-top: 16px; flex-wrap: wrap; }
  .hctl { text-align: center; }
  .hctl .lbl { font-weight: 900; font-size: .85rem; color: #4a6280; margin-bottom: 6px; }
  .hctl .row { display: flex; gap: 8px; }
  .hctl button {
    font-family: inherit; font-weight: 900; font-size: 1.4rem;
    width: 56px; height: 52px; border-radius: 14px; cursor: pointer;
    border: 3px solid #c3d6ea; background: #f4f9fe; color: var(--ink);
  }
  .hctl.hour button { border-color: #f3b3c2; background: #fdf0f3; }
  .hctl button:active { transform: scale(.95); }
  #btn-check {
    display: none; font-family: inherit; font-weight: 900; font-size: 1.1rem;
    background: var(--good); color: #fff; border: none; border-radius: 14px;
    padding: 13px 34px; margin-top: 16px; cursor: pointer;
  }

  #choices { display: none; justify-content: center; gap: 12px; margin-top: 18px; flex-wrap: wrap; }
  #choices button {
    font-family: inherit; font-weight: 900; font-size: 1.7rem;
    background: #f4f9fe; color: var(--ink); border: 3px solid #c3d6ea;
    border-radius: 18px; padding: 12px 24px; cursor: pointer; min-width: 110px;
    transition: transform .12s;
  }
  #choices button:hover { transform: scale(1.07); border-color: var(--accent2); }

  #feedback { min-height: 40px; margin-top: 14px; font-weight: 900; font-size: 1.15rem; }
  #feedback.good { color: var(--good); }
  #feedback.bad { color: var(--bad); }
  #next {
    display: none; font-family: inherit; font-weight: 900; font-size: 1.05rem;
    background: var(--accent); color: #fff; border: none; border-radius: 14px;
    padding: 12px 26px; margin-top: 10px; cursor: pointer;
  }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .shake { animation: shake .3s; }
  @keyframes pop { 0%{transform:scale(.4);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  .pop { animation: pop .35s; }
  .confetti {
    position: fixed; font-size: 1.7rem; pointer-events: none; z-index: 50;
    animation: fly 1.1s ease-out forwards;
  }
  @keyframes fly {
    0% { transform: translateY(0) scale(.6) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-140px) scale(1.4) rotate(40deg); opacity: 0; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" title="Zpět na rozcestník">🏠</a>
  <button class="nav" id="btn-back" style="display:none">← Jiná hra</button>
  <h1>🕐 Hodiny</h1>
  <div class="spacer"></div>
  <div class="stats">
    <span>⭐ <b id="stat-stars">0</b></span>
    <span>🔥 <b id="stat-streak">0</b></span>
  </div>
</header>

<div id="home">
  <button class="mode-card" data-mode="read">
    <span class="emoji">👀</span>
    <h3>Kolik je hodin?</h3>
    <p>Podívej se na ručičky a vyber správný čas</p>
  </button>
  <button class="mode-card" data-mode="set">
    <span class="emoji">🎯</span>
    <h3>Nastav ručičky</h3>
    <p>Posuň ručičky tak, aby ukazovaly zadaný čas</p>
  </button>
</div>

<div id="game">
  <div class="chips" id="chips"></div>
  <div id="qcard">
    <div id="qtitle"></div>
    <div id="target-time"></div>
    <div id="clockwrap">
      <svg id="clock" viewBox="0 0 200 200"></svg>
    </div>
    <div id="hand-controls">
      <div class="hctl hour">
        <div class="lbl">🕐 HODINY</div>
        <div class="row">
          <button id="h-minus">−</button>
          <button id="h-plus">+</button>
        </div>
      </div>
      <div class="hctl">
        <div class="lbl">⏱️ MINUTY (po 5)</div>
        <div class="row">
          <button id="m-minus">−</button>
          <button id="m-plus">+</button>
        </div>
      </div>
    </div>
    <button id="btn-check">HOTOVO ✔</button>
    <div id="choices"></div>
    <div id="feedback"></div>
    <button id="next">Další ➜</button>
  </div>
</div>

<script>
(function () {
  const $ = id => document.getElementById(id);
  const rnd = n => Math.floor(Math.random() * n);
  const pick = a => a[rnd(a.length)];
  const shuffle = a => { for (let i = a.length - 1; i > 0; i--) { const j = rnd(i + 1); [a[i], a[j]] = [a[j], a[i]]; } return a; };
  const fmt = (h, m) => String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");

  // ---------- stav ----------
  const store = JSON.parse(localStorage.getItem("tt-hodiny") || '{"stars":0}');
  let mode = null, setting = 0, q = null, tries = 0, locked = false, streak = 0;
  let curH = 3, curM = 0; // aktuální poloha ručiček v režimu "nastav"

  function save() { localStorage.setItem("tt-hodiny", JSON.stringify(store)); }
  function renderStats() {
    $("stat-stars").textContent = store.stars;
    $("stat-streak").textContent = streak;
  }
  function confetti() {
    const emo = ["🎉", "⭐", "✨", "🎊", "🌟"];
    const r = $("qcard").getBoundingClientRect();
    for (let i = 0; i < 8; i++) {
      const s = document.createElement("span");
      s.className = "confetti";
      s.textContent = pick(emo);
      s.style.left = (r.left + r.width / 2 + (Math.random() - 0.5) * r.width * 0.7) + "px";
      s.style.top = (r.top + r.height / 2) + "px";
      s.style.animationDelay = (Math.random() * 0.25) + "s";
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 1600);
    }
  }

  // ---------- vykreslení ciferníku ----------
  const svg = $("clock");
  function drawClockFace() {
    let s = '<circle cx="100" cy="100" r="96" fill="#fff" stroke="#1d3557" stroke-width="5"/>';
    for (let i = 0; i < 60; i++) {
      const a = i * 6 * Math.PI / 180;
      const big = i % 5 === 0;
      const r1 = big ? 82 : 87, r2 = 91;
      s += `<line x1="${100 + r1 * Math.sin(a)}" y1="${100 - r1 * Math.cos(a)}" x2="${100 + r2 * Math.sin(a)}" y2="${100 - r2 * Math.cos(a)}" stroke="#1d3557" stroke-width="${big ? 3 : 1}" stroke-linecap="round"/>`;
    }
    for (let n = 1; n <= 12; n++) {
      const a = n * 30 * Math.PI / 180;
      s += `<text x="${100 + 70 * Math.sin(a)}" y="${100 - 70 * Math.cos(a) + 7}" text-anchor="middle" font-family="Nunito" font-size="20" font-weight="900" fill="#1d3557">${n}</text>`;
    }
    s += '<g id="hands"></g><circle cx="100" cy="100" r="6" fill="#e05555"/>';
    svg.innerHTML = s;
  }
  function drawHands(h, m) {
    // hodinová ručička se posouvá plynule s minutami – přesně jako na opravdových hodinách
    const ha = ((h % 12) * 30 + m * 0.5) * Math.PI / 180;
    const ma = (m * 6) * Math.PI / 180;
    svg.querySelector("#hands").innerHTML =
      `<line x1="100" y1="100" x2="${100 + 45 * Math.sin(ha)}" y2="${100 - 45 * Math.cos(ha)}" stroke="#e05555" stroke-width="8" stroke-linecap="round"/>` +
      `<line x1="100" y1="100" x2="${100 + 66 * Math.sin(ma)}" y2="${100 - 66 * Math.cos(ma)}" stroke="#1d3557" stroke-width="5" stroke-linecap="round"/>`;
  }
  drawClockFace();

  // ---------- generátor času (24h formát, minuty po 5) ----------
  function randTime() {
    return { h: rnd(24), m: 5 * rnd(12) };
  }
  const exp12 = h => h % 12 === 0 ? 12 : h % 12; // poloha hodinové ručičky

  // ---------- navigace ----------
  document.querySelectorAll(".mode-card").forEach(b => {
    b.onclick = () => {
      mode = b.dataset.mode;
      $("home").style.display = "none";
      $("game").style.display = "block";
      $("btn-back").style.display = "inline-block";
      setting = 2; // vždy po 5 minutách
      nextQuestion();
    };
  });
  $("btn-back").onclick = () => {
    $("game").style.display = "none";
    $("btn-back").style.display = "none";
    $("home").style.display = "grid";
  };

  // ---------- otázky ----------
  function nextQuestion() {
    q = randTime();
    tries = 0; locked = false;
    $("feedback").textContent = ""; $("feedback").className = "";
    $("next").style.display = "none";

    if (mode === "read") {
      $("qtitle").textContent = "Kolik je hodin na ciferníku?";
      $("target-time").style.display = "none";
      $("hand-controls").style.display = "none";
      $("btn-check").style.display = "none";
      drawHands(q.h, q.m);
      // možnosti: správný čas (klidně 24h, např. 17:55) + nástrahy;
      // 12h dvojče správného času (05:55 vs 17:55) se mezi možnostmi nikdy neobjeví
      const correct = fmt(q.h, q.m);
      const twin = fmt((q.h + 12) % 24, q.m);
      const opts = new Set([correct]);
      const swapM = (q.h % 12) * 5; // prohozené ručičky
      const swapH = (Math.random() < 0.5 ? 0 : 12) + Math.floor(q.m / 5) % 12;
      const swap = fmt(swapH, swapM);
      if (swap !== twin && swap !== correct) opts.add(swap);
      let guard = 0;
      while (opts.size < 4 && guard++ < 80) {
        const t = randTime();
        const s = fmt(t.h, t.m);
        if (s !== twin) opts.add(s);
      }
      const ch = $("choices");
      ch.style.display = "flex";
      ch.innerHTML = "";
      shuffle([...opts]).forEach(o => {
        const b = document.createElement("button");
        b.textContent = o;
        b.onclick = () => answer(o);
        ch.appendChild(b);
      });
    } else {
      $("qtitle").textContent = "Nastav ručičky na tento čas:";
      $("target-time").style.display = "block";
      $("target-time").textContent = fmt(q.h, q.m);
      $("choices").style.display = "none";
      $("hand-controls").style.display = "flex";
      $("btn-check").style.display = "inline-block";
      // začni z jiného času, ať je co posouvat
      do { curH = 1 + rnd(12); curM = 5 * rnd(12); } while (curH === exp12(q.h) && curM === q.m);
      drawHands(curH, curM);
    }
    $("qcard").classList.remove("pop");
    void $("qcard").offsetWidth;
    $("qcard").classList.add("pop");
  }

  // ---------- ovládání ručiček ----------
  function moveM(d) {
    if (locked || mode !== "set") return;
    curM += d * 5;
    if (curM >= 60) { curM -= 60; curH = curH % 12 + 1; }
    if (curM < 0) { curM += 60; curH = curH === 1 ? 12 : curH - 1; }
    drawHands(curH, curM);
  }
  function moveH(d) {
    if (locked || mode !== "set") return;
    curH += d;
    if (curH > 12) curH = 1;
    if (curH < 1) curH = 12;
    drawHands(curH, curM);
  }
  $("m-plus").onclick = () => moveM(1);
  $("m-minus").onclick = () => moveM(-1);
  $("h-plus").onclick = () => moveH(1);
  $("h-minus").onclick = () => moveH(-1);
  $("btn-check").onclick = () => {
    if (locked || mode !== "set") return;
    // ciferník ukazuje polohu 1–12; správně je, když sedí poloha ručiček a minuty
    answer(curH === exp12(q.h) && curM === q.m ? fmt(q.h, q.m) : "špatně");
  };

  // ---------- vyhodnocení ----------
  function answer(val) {
    if (locked || !q) return;
    if (val === fmt(q.h, q.m)) {
      locked = true;
      streak++;
      store.stars++;
      save();
      renderStats();
      $("feedback").textContent = pick(["Výborně! 🎉", "Super! ⭐", "Paráda! 👏", "Přesně tak! 🌟", "Jsi šikula! 💪"]);
      $("feedback").className = "good";
      if (mode === "read") drawHands(q.h, q.m);
      confetti();
      setTimeout(nextQuestion, 1400);
    } else {
      tries++;
      streak = 0;
      renderStats();
      $("qcard").classList.remove("shake");
      void $("qcard").offsetWidth;
      $("qcard").classList.add("shake");
      if (tries >= 2) {
        locked = true;
        $("feedback").textContent = "Správně je " + fmt(q.h, q.m) + ". Příště to dáš!";
        $("feedback").className = "bad";
        if (mode === "set") drawHands(q.h, q.m);
        $("next").style.display = "inline-block";
      } else {
        const hint = mode === "set"
          ? "Zkus to ještě jednou! Malá červená ručička = hodiny, velká modrá = minuty."
          : "Zkus to ještě jednou! Malá červená ručička ukazuje hodiny.";
        $("feedback").textContent = hint;
        $("feedback").className = "bad";
      }
    }
  }

  $("next").onclick = nextQuestion;
  renderStats();
})();
</script>
</body>
</html>
