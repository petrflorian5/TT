<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tobíkova a Timčina mapa světa 🌍</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean: #bfe0f0;
    --land: #ece6d4;
    --land-stroke: #b8b09a;
    --nodata: #ddd6c6;
    --accent: #ff8c42;
    --accent2: #3d7dd8;
    --good: #3cb371;
    --bad: #e05555;
    --ink: #2c3a47;
    --card: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--ocean);
    color: var(--ink);
    display: flex;
    flex-direction: column;
  }

  /* ---------- horní lišta ---------- */
  header {
    background: #fff;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,.12);
    z-index: 20;
  }
  header h1 { font-size: 1.25rem; font-weight: 900; white-space: nowrap; }
  .modes, .regions { display: flex; gap: 6px; flex-wrap: wrap; }
  .btn {
    border: 2px solid transparent;
    background: #eef2f6;
    color: var(--ink);
    font-family: inherit;
    font-weight: 800;
    font-size: .85rem;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: all .15s;
  }
  .btn:hover { background: #dde6ee; transform: translateY(-1px); }
  .modes .btn.active { background: var(--accent); color: #fff; }
  .regions .btn { font-size: .78rem; padding: 5px 10px; }
  .regions .btn.active { background: var(--accent2); color: #fff; }
  .spacer { flex: 1; }
  .stats {
    display: flex; gap: 10px; align-items: center;
    font-weight: 800; font-size: .9rem; white-space: nowrap;
  }
  .stats span b { color: var(--accent); font-size: 1.05rem; }

  /* ---------- mapa ---------- */
  #mapwrap { position: relative; flex: 1; }
  svg#map { width: 100%; height: 100%; display: block; cursor: grab; }
  svg#map:active { cursor: grabbing; }
  .country {
    fill: var(--land); stroke: var(--land-stroke); stroke-width: .7;
    vector-effect: non-scaling-stroke; pointer-events: all;
  }
  svg#map.satellite .country { stroke: rgba(255,255,255,.65); }
  .country.nodata { fill: var(--nodata); pointer-events: none; }
  .country.hoverable:hover { cursor: pointer; }
  .country.game-hover:hover { filter: brightness(1.15) saturate(1.15); cursor: pointer; }
  svg#map.satellite .country.game-hover:hover { fill: rgba(255,255,255,.25) !important; }
  .country.flash-good { fill: var(--good) !important; }
  .country.flash-bad { fill: var(--bad) !important; }
  .country.revealed { fill: var(--good) !important; animation: pulse 1s ease-in-out 2; }
  .country.quiz-target { fill: #ffd166 !important; animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .55; } }

  .capital-dot { fill: #d81b60; stroke: #fff; }
  .capital-label {
    font-family: 'Nunito', sans-serif; font-weight: 900; fill: #333;
    paint-order: stroke; stroke: #fff; stroke-linejoin: round;
    pointer-events: none;
  }

  /* ---------- info karta (režim objevování) ---------- */
  #info {
    position: absolute; top: 14px; left: 14px;
    background: var(--card); border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,.18);
    padding: 18px 22px; min-width: 300px; max-width: 380px;
    display: none; pointer-events: none; z-index: 10;
  }
  #info img { width: 220px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,.35); display: block; }
  #info .cname { font-size: 1.6rem; font-weight: 900; margin-top: 10px; }
  #info .ccap { font-size: 1.2rem; margin-top: 3px; }
  #info .ccap b { color: #d81b60; }
  #hint {
    position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,.92); padding: 7px 18px; border-radius: 999px;
    font-weight: 800; font-size: .85rem; box-shadow: 0 2px 8px rgba(0,0,0,.15);
    pointer-events: none; z-index: 10; white-space: nowrap;
  }

  /* ---------- herní panel ---------- */
  #game {
    position: absolute; top: 14px; right: 14px; width: 280px;
    background: var(--card); border-radius: 18px;
    box-shadow: 0 6px 20px rgba(0,0,0,.2);
    padding: 16px; display: none; z-index: 10;
  }
  #game h2 { font-size: 1rem; font-weight: 900; margin-bottom: 10px; }
  #q-flag { width: 100%; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,.25); display: none; }
  #q-text { font-size: 1.5rem; font-weight: 900; text-align: center; margin: 8px 0; display: none; }
  #q-sub { font-size: .85rem; text-align: center; color: #667; margin-bottom: 8px; }
  #answer-row { display: none; gap: 6px; margin-top: 8px; }
  #answer {
    flex: 1; min-width: 0; font-family: inherit; font-size: 1rem; font-weight: 700;
    padding: 8px 10px; border: 2px solid #ccd5df; border-radius: 10px; outline: none;
  }
  #answer:focus { border-color: var(--accent2); }
  #submit {
    background: var(--accent2); color: #fff; border: none; border-radius: 10px;
    font-family: inherit; font-weight: 800; padding: 8px 12px; cursor: pointer;
  }
  #feedback { min-height: 44px; font-weight: 800; font-size: .95rem; text-align: center; margin-top: 10px; }
  #feedback.good { color: var(--good); }
  #feedback.bad { color: var(--bad); }
  #next {
    display: none; width: 100%; margin-top: 8px;
    background: var(--accent); color: #fff; border: none; border-radius: 12px;
    font-family: inherit; font-weight: 900; font-size: 1rem; padding: 10px; cursor: pointer;
  }
  #game .score-row {
    display: flex; justify-content: space-around; margin-top: 12px;
    border-top: 2px dashed #e2e6ea; padding-top: 10px;
    font-size: .8rem; font-weight: 800; text-align: center; color: #667;
  }
  #game .score-row b { display: block; font-size: 1.2rem; color: var(--ink); }

  /* ---------- zoom tlačítka ---------- */
  #zoomctl {
    position: absolute; bottom: 14px; right: 14px; display: flex; flex-direction: column; gap: 6px; z-index: 10;
  }
  #zoomctl button {
    width: 40px; height: 40px; border-radius: 12px; border: none;
    background: #fff; font-size: 1.3rem; font-weight: 900; color: var(--ink);
    box-shadow: 0 2px 8px rgba(0,0,0,.2); cursor: pointer;
  }
  #zoomctl button:hover { background: #f0f4f8; }

  /* ---------- konfety ---------- */
  .confetti {
    position: absolute; font-size: 1.6rem; pointer-events: none; z-index: 50;
    animation: fly 1.1s ease-out forwards;
  }
  @keyframes fly {
    0%   { transform: translateY(0) scale(.6) rotate(0deg); opacity: 1; }
    100% { transform: translateY(-130px) scale(1.4) rotate(40deg); opacity: 0; }
  }

  #loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; font-weight: 900; color: var(--ink); z-index: 30;
  }

  @media (max-width: 720px) {
    #game { width: calc(100% - 28px); top: auto; bottom: 14px; }
    #hint { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>🌍 Tobíkova a Timčina mapa světa</h1>
  <nav class="modes" id="modes">
    <button class="btn active" data-mode="explore">🔎 Objevuj</button>
    <button class="btn" data-mode="flag">🚩 Hádej vlajku</button>
    <button class="btn" data-mode="capital">🏙️ Najdi zemi města</button>
    <button class="btn" data-mode="type">✏️ Napiš hlavní město</button>
  </nav>
  <nav class="regions" id="regions"></nav>
  <button class="btn" id="basemap-toggle" title="Přepnout podklad mapy">🛰️ Satelit</button>
  <div class="spacer"></div>
  <div class="stats">
    <span>⭐ Body: <b id="stat-points">0</b></span>
    <span>🔥 Série: <b id="stat-streak">0</b></span>
    <span>🏆 Rekord: <b id="stat-best">0</b></span>
  </div>
</header>

<div id="mapwrap">
  <div id="loading">Načítám mapu světa… 🗺️</div>
  <svg id="map"></svg>

  <div id="info">
    <img id="info-flag" alt="vlajka">
    <div class="cname" id="info-name"></div>
    <div class="ccap" id="info-cap"></div>
  </div>

  <div id="hint">Najeď myší na stát – uvidíš jeho vlajku a hlavní město. Kolečkem přibližuj!</div>

  <div id="game">
    <h2 id="g-title"></h2>
    <img id="q-flag" alt="vlajka">
    <div id="q-text"></div>
    <div id="q-sub"></div>
    <div id="answer-row">
      <input id="answer" autocomplete="off" placeholder="Napiš hlavní město…">
      <button id="submit">OK</button>
    </div>
    <div id="feedback"></div>
    <button id="next">Další otázka ➜</button>
    <div class="score-row">
      <div>Otázka<b id="g-qnum">1</b></div>
      <div>Správně<b id="g-correct">0</b></div>
      <div>Pokusy<b id="g-tries">3</b></div>
    </div>
  </div>

  <div id="zoomctl">
    <button id="z-in" title="Přiblížit">＋</button>
    <button id="z-out" title="Oddálit">－</button>
    <button id="z-reset" title="Celý svět">🌍</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="data.js"></script>
<script>
(async function () {
  const svg = d3.select("#map");
  const wrap = document.getElementById("mapwrap");
  let W = wrap.clientWidth, H = wrap.clientHeight;

  // dvě projekce: atlas (Natural Earth) a satelit (equirectangular – sedí na NASA snímek)
  const projAtlas = d3.geoNaturalEarth1();
  const projSat = d3.geoEquirectangular();
  let projection = projAtlas;
  let satellite = false;
  const SAT_URL = "https://upload.wikimedia.org/wikipedia/commons/5/56/Blue_Marble_Next_Generation_%2B_topography_%2B_bathymetry.jpg";
  const path = d3.geoPath(projection);
  if (path.digits) path.digits(1); // kratší SVG cesty = plynulejší vykreslování
  const g = svg.append("g");
  const gCountries = g.append("g");
  const gOverlay = g.append("g");

  // ---------- načtení mapy ----------
  const topo = await d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json");
  const features = topojson.feature(topo, topo.objects.countries).features;
  document.getElementById("loading").remove();

  const dataFor = f => {
    const name = f.properties && f.properties.name;
    return COUNTRIES[f.id] || COUNTRIES_BY_NAME[name] || COUNTRIES[NAME_ALIASES[name]] || null;
  };

  // ---------- barvy kontinentů (režim atlas) ----------
  const CONT_COLORS = { EU: "#a8d5a2", AS: "#f6d976", AF: "#f4a960", NA: "#ef9a9a", SA: "#c5a3e0", OC: "#7ecfc4", AN: "#eef3f6" };
  function baseFillFor(f) {
    if (satellite) return "transparent";
    const d = dataFor(f);
    if (!d) return "var(--nodata)";
    const base = d3.color(CONT_COLORS[d[5]] || "#ddd");
    const v = (parseInt(f.id, 10) || (f.properties && f.properties.name || "x").length) % 3;
    return v === 1 ? base.brighter(0.25).formatHex() : v === 2 ? base.darker(0.15).formatHex() : base.formatHex();
  }
  // pozn.: inline styl (style) má přednost před CSS třídou, atribut fill by CSS nepřebil
  function applyFills() { paths.style("fill", baseFillFor); }

  // satelitní snímek pod hranicemi zemí
  const satImg = g.insert("image", ":first-child")
    .attr("preserveAspectRatio", "none")
    .style("display", "none");

  // oceán = pozadí (jen v režimu atlas)
  const sphere = g.insert("path", ":first-child").datum({ type: "Sphere" })
    .attr("fill", "var(--ocean)").attr("stroke", "none");

  function fit() {
    W = wrap.clientWidth; H = wrap.clientHeight;
    svg.attr("viewBox", `0 0 ${W} ${H}`);
    projection.fitExtent([[8, 8], [W - 8, H - 8]], { type: "Sphere" });
    path.projection(projection);
    gCountries.selectAll("path").attr("d", path);
    sphere.attr("d", path).style("display", satellite ? "none" : null);
    if (satellite) {
      const tl = projection([-180, 90]), br = projection([180, -90]);
      satImg.attr("x", tl[0]).attr("y", tl[1])
        .attr("width", br[0] - tl[0]).attr("height", br[1] - tl[1])
        .style("display", null);
      if (!satImg.attr("href")) satImg.attr("href", SAT_URL);
    } else {
      satImg.style("display", "none");
    }
  }

  const paths = gCountries.selectAll("path")
    .data(features)
    .join("path")
    .attr("class", f => "country" + (dataFor(f) ? " hoverable" : " nodata"));

  fit();
  applyFills();
  window.addEventListener("resize", () => { fit(); });

  // ---------- přepínač podkladu ----------
  const bmBtn = document.getElementById("basemap-toggle");
  bmBtn.onclick = () => {
    satellite = !satellite;
    projection = satellite ? projSat : projAtlas;
    bmBtn.textContent = satellite ? "🎨 Atlas" : "🛰️ Satelit";
    svg.classed("satellite", satellite);
    hideCapital(); hideInfo();
    fit();
    applyFills();
    svg.call(zoom.transform, d3.zoomIdentity);
    if (region !== "ALL") zoomToBBox(CONTINENTS[region].bbox, 600);
    if (mode === "type" && current && !locked) zoomToFeature(current.f, [current.d[3], current.d[4]], 600);
  };

  // ---------- zoom ----------
  let curK = 1;
  const zoom = d3.zoom()
    .scaleExtent([1, 80])
    .on("zoom", (e) => {
      curK = e.transform.k;
      g.attr("transform", e.transform); // šířku čar řeší CSS (vector-effect)
      updateOverlayScale();
    });
  svg.call(zoom);

  function zoomToBBox(bbox, dur = 900) {
    if (!bbox) { svg.transition().duration(dur).call(zoom.transform, d3.zoomIdentity); return; }
    const [[w1, s1], [e1, n1]] = bbox;
    // vzorkování okrajů bboxu pro přesnější projekci
    const pts = [];
    for (let i = 0; i <= 10; i++) {
      const t = i / 10;
      pts.push([w1 + (e1 - w1) * t, s1], [w1 + (e1 - w1) * t, n1], [w1, s1 + (n1 - s1) * t], [e1, s1 + (n1 - s1) * t]);
    }
    const proj = pts.map(p => projection(p)).filter(Boolean);
    const xs = proj.map(p => p[0]), ys = proj.map(p => p[1]);
    const x0 = Math.min(...xs), x1 = Math.max(...xs), y0 = Math.min(...ys), y1 = Math.max(...ys);
    const k = Math.max(1, Math.min(80, 0.88 / Math.max((x1 - x0) / W, (y1 - y0) / H)));
    const tx = W / 2 - k * (x0 + x1) / 2, ty = H / 2 - k * (y0 + y1) / 2;
    svg.transition().duration(dur).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
  }

  function zoomToFeature(f, capLonLat, dur = 900) {
    // u zemí s více polygony (Francie, USA…) přiblížíme polygon s hlavním městem
    let geom = f.geometry;
    if (geom.type === "MultiPolygon") {
      let best = null, bestArea = -1;
      for (const coords of geom.coordinates) {
        const poly = { type: "Polygon", coordinates: coords };
        if (capLonLat && d3.geoContains(poly, capLonLat)) { best = poly; break; }
        const a = d3.geoArea(poly);
        if (a > bestArea) { bestArea = a; best = poly; }
      }
      geom = best || geom;
    }
    const b = path.bounds(geom);
    const dx = b[1][0] - b[0][0], dy = b[1][1] - b[0][1];
    const k = Math.max(1, Math.min(40, 0.45 / Math.max(dx / W, dy / H)));
    const tx = W / 2 - k * (b[0][0] + b[1][0]) / 2, ty = H / 2 - k * (b[0][1] + b[1][1]) / 2;
    svg.transition().duration(dur).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
  }

  document.getElementById("z-in").onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1.6);
  document.getElementById("z-out").onclick = () => svg.transition().duration(300).call(zoom.scaleBy, 1 / 1.6);
  document.getElementById("z-reset").onclick = () => zoomToBBox(null);

  // ---------- tlačítka kontinentů ----------
  const regionsNav = document.getElementById("regions");
  let region = "ALL";
  for (const [key, c] of Object.entries(CONTINENTS)) {
    const b = document.createElement("button");
    b.className = "btn" + (key === "ALL" ? " active" : "");
    b.textContent = c.label;
    b.onclick = () => {
      region = key;
      regionsNav.querySelectorAll(".btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      zoomToBBox(c.bbox);
      if (mode !== "explore") { buildPool(); nextQuestion(); }
    };
    regionsNav.appendChild(b);
  }

  // zvýraznění státu při najetí (vlajka se zobrazuje jen v kartě v rohu)
  function hlFillFor(f) {
    if (satellite) return "rgba(255,255,255,.35)";
    return d3.color(baseFillFor(f)).brighter(0.55).formatHex();
  }

  // ---------- hlavní město: značka ----------
  let capitalMark = null;
  function showCapital(d) {
    hideCapital();
    if (!d[2]) return;
    const [x, y] = projection([d[3], d[4]]);
    capitalMark = gOverlay.append("g").attr("transform", `translate(${x},${y})`);
    capitalMark.append("circle").attr("class", "capital-dot");
    capitalMark.append("text").attr("class", "capital-label").text(d[2]);
    updateOverlayScale();
  }
  function hideCapital() { if (capitalMark) { capitalMark.remove(); capitalMark = null; } }
  function updateOverlayScale() {
    if (!capitalMark) return;
    capitalMark.select("circle").attr("r", 4.5 / curK).attr("stroke-width", 1.5 / curK);
    capitalMark.select("text")
      .attr("x", 7 / curK).attr("y", 4 / curK)
      .attr("font-size", (13 / curK) + "px")
      .attr("stroke-width", 3 / curK);
  }

  // ---------- info karta ----------
  const flagUrl = (d, w) => d[8] || "https://flagcdn.com/w" + w + "/" + d[0] + ".png";
  const info = document.getElementById("info");
  function showInfo(d) {
    document.getElementById("info-flag").src = flagUrl(d, 320);
    document.getElementById("info-name").textContent = d[1];
    document.getElementById("info-cap").innerHTML = d[2] ? "Hlavní město: <b>" + d[2] + "</b>" : "";
    info.style.display = "block";
  }
  function hideInfo() { info.style.display = "none"; }

  // ---------- statistiky ----------
  const stats = JSON.parse(localStorage.getItem("tobik-map-stats") || '{"points":0,"best":0}');
  let streak = 0;
  function renderStats() {
    document.getElementById("stat-points").textContent = stats.points;
    document.getElementById("stat-streak").textContent = streak;
    document.getElementById("stat-best").textContent = stats.best;
  }
  function addPoints(p) {
    stats.points += p;
    streak++;
    if (streak > stats.best) stats.best = streak;
    localStorage.setItem("tobik-map-stats", JSON.stringify(stats));
    renderStats();
  }
  function breakStreak() { streak = 0; renderStats(); }
  renderStats();

  function confetti(x, y) {
    const emo = ["🎉", "⭐", "✨", "🎊", "🌟"];
    for (let i = 0; i < 7; i++) {
      const s = document.createElement("span");
      s.className = "confetti";
      s.textContent = emo[Math.floor(Math.random() * emo.length)];
      s.style.left = (x + (Math.random() - 0.5) * 120) + "px";
      s.style.top = (y + (Math.random() - 0.5) * 40) + "px";
      s.style.animationDelay = (Math.random() * 0.25) + "s";
      wrap.appendChild(s);
      setTimeout(() => s.remove(), 1600);
    }
  }

  // ---------- režimy ----------
  const CONT_NAMES = { EU: "v Evropě", AS: "v Asii", AF: "v Africe", NA: "v Severní Americe", SA: "v Jižní Americe", OC: "v Austrálii a Oceánii", AN: "v Antarktidě" };
  let mode = "explore";
  const gamePanel = document.getElementById("game");
  const hintBar = document.getElementById("hint");

  document.getElementById("modes").querySelectorAll(".btn").forEach(b => {
    b.onclick = () => {
      document.getElementById("modes").querySelectorAll(".btn").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      setMode(b.dataset.mode);
    };
  });

  function setMode(m) {
    mode = m;
    hideCapital(); hideInfo(); clearGameStyles();
    paths.classed("game-hover", m === "flag" || m === "capital");
    if (m === "explore") {
      gamePanel.style.display = "none";
      hintBar.style.display = "block";
    } else {
      hintBar.style.display = "none";
      gamePanel.style.display = "block";
      qNum = 0; correctCount = 0;
      buildPool();
      nextQuestion();
    }
  }

  // ---------- interakce s mapou ----------
  paths
    .on("mouseover", function (e, f) {
      const d = dataFor(f);
      if (!d) return;
      if (mode === "explore") {
        d3.select(this).style("fill", hlFillFor(f)).raise();
        showCapital(d);
        showInfo(d);
      }
    })
    .on("mouseout", function (e, f) {
      if (mode === "explore") {
        d3.select(this).style("fill", baseFillFor(f));
        hideCapital(); hideInfo();
      }
    })
    .on("click", function (e, f) {
      const d = dataFor(f);
      if (!d) return;
      if (mode === "explore") {
        zoomToFeature(f, [d[3], d[4]]);
      } else if (mode === "flag" || mode === "capital") {
        handleMapGuess(this, f, d, e);
      }
    });

  // ---------- herní logika ----------
  let pool = [], poolIdx = 0, current = null, tries = 3, locked = false;
  let qNum = 0, correctCount = 0;

  // seznam hratelných zemí (bez závislých území), s odkazem na prvky mapy
  const playable = [];
  const seen = new Set();
  for (const f of features) {
    const d = dataFor(f);
    if (d && !d[6] && !seen.has(d[0])) {
      seen.add(d[0]);
      playable.push({ d, f });
    }
  }

  function buildPool() {
    pool = playable.filter(p => region === "ALL" || p.d[5] === region);
    d3.shuffle(pool);
    poolIdx = 0;
  }

  const el = id => document.getElementById(id);

  function clearGameStyles() {
    paths.classed("flash-good", false).classed("flash-bad", false)
      .classed("revealed", false).classed("quiz-target", false);
    applyFills();
    hideCapital();
  }

  function nextQuestion() {
    clearGameStyles();
    locked = false;
    tries = 3;
    if (!pool.length) return;
    if (poolIdx >= pool.length) { d3.shuffle(pool); poolIdx = 0; }
    current = pool[poolIdx++];
    qNum++;
    el("g-qnum").textContent = qNum;
    el("g-correct").textContent = correctCount;
    el("g-tries").textContent = tries;
    el("feedback").textContent = ""; el("feedback").className = "";
    el("next").style.display = "none";
    el("q-flag").style.display = "none";
    el("q-text").style.display = "none";
    el("answer-row").style.display = "none";

    if (mode === "flag") {
      el("g-title").textContent = "🚩 Čí je to vlajka? Klikni na zemi!";
      el("q-flag").src = flagUrl(current.d, 320);
      el("q-flag").style.display = "block";
      el("q-sub").textContent = "Najdi tuhle zemi na mapě.";
    } else if (mode === "capital") {
      el("g-title").textContent = "🏙️ Kde je tohle hlavní město?";
      el("q-text").textContent = current.d[2];
      el("q-text").style.display = "block";
      el("q-sub").textContent = "Klikni na zemi, jejíž je to hlavní město.";
    } else if (mode === "type") {
      el("g-title").textContent = "✏️ Jaké je hlavní město?";
      el("q-flag").src = flagUrl(current.d, 320);
      el("q-flag").style.display = "block";
      el("q-text").textContent = current.d[1];
      el("q-text").style.display = "block";
      el("q-sub").textContent = "Napiš hlavní město této země.";
      el("answer-row").style.display = "flex";
      el("answer").value = "";
      // zvýrazni a přibliž zemi
      paths.filter(f => { const d = dataFor(f); return d && d[0] === current.d[0]; }).classed("quiz-target", true);
      zoomToFeature(current.f, [current.d[3], current.d[4]]);
      setTimeout(() => el("answer").focus(), 100);
    }
  }

  function hintText() {
    if (tries === 1) return "Nápověda: je to " + (CONT_NAMES[current.d[5]] || "…") + "!";
    return "";
  }

  function success(clickX, clickY) {
    locked = true;
    correctCount++;
    const pts = tries; // 3 / 2 / 1 bod
    addPoints(pts);
    el("g-correct").textContent = correctCount;
    el("feedback").textContent = "Výborně! 🎉 +" + pts + (pts === 1 ? " bod" : pts < 5 ? " body" : " bodů");
    el("feedback").className = "good";
    confetti(clickX ?? W / 2, clickY ?? H / 2);
    // zvýrazni zemi zeleně a ukaž hlavní město
    paths.filter(f => { const d = dataFor(f); return d && d[0] === current.d[0]; })
      .classed("quiz-target", false)
      .classed("flash-good", true);
    showCapital(current.d);
    setTimeout(nextQuestion, 1800);
  }

  function reveal() {
    locked = true;
    breakStreak();
    el("feedback").textContent = "Tohle je " + current.d[1] + (current.d[2] ? " – hlavní město " + current.d[2] + "." : ".");
    el("feedback").className = "bad";
    paths.filter(f => { const d = dataFor(f); return d && d[0] === current.d[0]; })
      .classed("quiz-target", false).classed("revealed", true);
    showCapital(current.d);
    zoomToFeature(current.f, [current.d[3], current.d[4]]);
    el("next").style.display = "block";
  }

  function handleMapGuess(elem, f, d, e) {
    if (locked || !current) return;
    if (d[6]) return; // závislá území se nepočítají
    if (d[0] === current.d[0]) {
      success(e.clientX, e.clientY - 60);
    } else {
      tries--;
      el("g-tries").textContent = tries;
      d3.select(elem).classed("flash-bad", true);
      setTimeout(() => d3.select(elem).classed("flash-bad", false), 600);
      if (tries <= 0) { reveal(); return; }
      el("feedback").textContent = "To je " + d[1] + ". Zkus to znovu! " + hintText();
      el("feedback").className = "bad";
      breakStreak();
    }
  }

  // ---------- psaní hlavního města ----------
  const norm = s => s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
  function lev1(a, b) { // levenshtein <= 1
    if (a === b) return true;
    if (Math.abs(a.length - b.length) > 1) return false;
    let i = 0, j = 0, edits = 0;
    while (i < a.length && j < b.length) {
      if (a[i] === b[j]) { i++; j++; continue; }
      if (++edits > 1) return false;
      if (a.length > b.length) i++;
      else if (b.length > a.length) j++;
      else { i++; j++; }
    }
    return edits + (a.length - i) + (b.length - j) <= 1;
  }
  function checkTyped() {
    if (locked || !current || mode !== "type") return;
    const val = norm(el("answer").value);
    if (!val) return;
    const answers = [current.d[2], ...(current.d[7] || [])].map(norm);
    const ok = answers.some(a => a.length > 4 ? lev1(val, a) : val === a);
    if (ok) {
      el("answer").value = current.d[2];
      success();
    } else {
      tries--;
      el("g-tries").textContent = tries;
      breakStreak();
      if (tries <= 0) { reveal(); return; }
      let msg = "Zkus to znovu!";
      if (tries === 1) msg += " Nápověda: začíná na „" + current.d[2][0] + "“.";
      el("feedback").textContent = msg;
      el("feedback").className = "bad";
      el("answer").select();
    }
  }
  el("submit").onclick = checkTyped;
  el("answer").addEventListener("keydown", e => { if (e.key === "Enter") checkTyped(); });
  el("next").onclick = nextQuestion;

})();
</script>
